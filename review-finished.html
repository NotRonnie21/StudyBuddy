<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" href="icon.png">

    <link rel="stylesheet" href="main.css">
    <link rel="stylesheet" href="extra-designs.css">
    <link rel="stylesheet" href="reviews.css">
    <link rel="stylesheet" href="review-finished.css">

    <title>StudyBuddy</title>
  </head>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <body>

  
    <nav class="headtitle">

      <div class="titlecontainer">
        <img src="icon.png" style="width: 40px; height: auto;">
        <a href="index.html" id="title">StudyBuddy</a>
      </div>

      <div class="headerbtns">
        <a href="mydecks.html"><button class="mainbtn">My Decks</button></a>
        <a href="reviews.html"><button class="mainbtn">Review</button></a>
        <a href="quiz.html"><button class="mainbtn">Quiz</button></a>
      </div>

      <a id=cardscounter>No. of Cards</a>
      
    </nav>

    <div class="spacer">

      <div class="mdtopcontainer">
        <h1>Review Mode</h1>
      </div>
      
      <a class="subtitle">Flip through your cards one at a time</a>

      <div class="reviewresultscontainer">
        <img src="placeholder.png" style="width: 40px; height: auto;">
        <h1>Session Complete!</h1>
        <p>Great work studying today!</p>

        <div class="resultscontainer">  
            <div>
                <h1 id="cardsCounter"></h1>
                <p>Cards Reviewed</p>
            </div>
            
            <div>
                <h1 id="deckName"></h1>
                <p>Deck Name</p>
            </div>
        </div>

        <button onclick="reviewAgain()" class="mainbtn" style="color: #ecdece; background-color: #664435;">Review Again</button>
        
      </div>
    </div>

    <script>
        window.onload = function () {
    confetti({
        particleCount: 180,
        spread: 100,
        origin: { y: 0.6 }
    });
};

        const deck = JSON.parse(localStorage.getItem("currentReviewDeck"));

        if (!deck) {
            alert("No deck found!");
        } else {
            console.log(deck); // contains all cards
        }

        if (deck) {
    document.getElementById("deckName").innerText = deck.name;

    document.getElementById("cardsCounter").innerText =
        deck.cards.length ;
} else {
    document.getElementById("deckName").innerText = "No Deck Found";
    document.getElementById("cardsCounter").innerText = "0 Cards";
}

function reviewAgain() {
    const deck = JSON.parse(localStorage.getItem("currentReviewDeck"));

    if (!deck) {
        alert("No deck found!");
        return;
    }

    // optional reset (safe anyway)
    deck.cards = deck.cards || [];

    localStorage.setItem("currentReviewDeck", JSON.stringify(deck));

    window.location.href = "review-session.html";
}
    </script>
    </body>
</html>
