<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="icon" href="icon.png">
    
    <link rel="stylesheet" href="main.css">
    <link rel="stylesheet" href="extra-designs.css">
    <link rel="stylesheet" href="reviews.css">

    <title>StudyBuddy</title>
  </head>

    <body>
      
    
    <nav class="headtitle">
      <div class="titlecontainer">
        <img src="icon.png" style="width: 40px; height: auto;">
        <a href="index.html" id="title">StudyBuddy</a>
      </div>

      <a id="cardscounter">No. of Decks</a>
      
      <div class="headerbtns">
        

        <a href="mydecks.html"><button class="mainbtn" id="headermainBtns">My Decks</button></a>
        <a href="reviews.html"><button class="mainbtn">Review</button></a>
        <a href="quiz.html"><button class="mainbtn" id="headermainBtns">Quiz</button></a>
      </div>
    </nav>


    <div class="spacer">

      <div class="mdtopcontainer">
        <h1>Review Mode</h1>
      </div>
      
      <a class="subtitle">Flip through your cards one at a time</a>

      <div class="reviewcontainer">
        <h1>Configure Your Session</h1>
        <p>Select Deck</p>
        <select id="selectDeck" class="smallbtn">
          <option value="">-- Select a Deck --</option>
        </select>

        <p>Filter by Difficulty</p>
        <div id="filterDifficulty">
          <button onclick="setDifficulty('All')" class="smallbtn diff-btn all active">All</button>
          <button onclick="setDifficulty('Easy')" class="smallbtn diff-btn easy">Easy</button>
          <button onclick="setDifficulty('Medium')" class="smallbtn diff-btn medium">Medium</button>
          <button onclick="setDifficulty('Hard')" class="smallbtn diff-btn hard">Hard</button>
        </div>
        <button onclick="openReview()" class="mainbtn" id="reviewBtn">Start Review</button>
        
      </div>
    </div>
    
<script>
  // local storage setup
  let decks = JSON.parse(localStorage.getItem("decks")) || [];
  let cards = JSON.parse(localStorage.getItem("cards")) || [];
  const selectDeck = document.getElementById("selectDeck");
  let selectedDifficulty = "All";

  // update card counter in header
      function updateCounter() {
        document.getElementById("cardscounter").innerText =
          "No. of Cards: " + cards.length;
      }

  // Render deck options in the dropdown
  function renderDeckOptions() {
    if (decks.length === 0) {
      selectDeck.innerHTML = `<option value="">No decks available</option>`;
      return;
    }

    decks.forEach((deck, index) => {
      const option = document.createElement("option");
      option.value = index;
      option.textContent = deck.name; // assuming deck has a name
      selectDeck.appendChild(option);
    });
  }

  // Open review session with selected deck
  function openReview() {
    const selectedIndex = selectDeck.value;

    if (selectedIndex === "") {
      alert("Please select a deck first!");
      return;
    }

    const selectedDeck = decks[selectedIndex];

    // Get all cards and filter by selected deck
    const allCards = JSON.parse(localStorage.getItem("cards")) || [];

    // Attach cards to the selected deck
    selectedDeck.cards = allCards.filter(card => {
      const sameDeck = card.deckId == selectedDeck.id;

      if (selectedDifficulty === "All") return sameDeck;

      return sameDeck && card.difficulty === selectedDifficulty;
    });

    
    if (!selectedDeck.cards || selectedDeck.cards.length === 0) {
      alert("This deck has no cards!");
      return;
    }


    // save for next page if needed
    localStorage.setItem("currentReviewDeck", JSON.stringify(selectedDeck));

    // redirect to review session page
    window.location.href = "review-session.html";
  }

  function setDifficulty(level) {
  selectedDifficulty = level;

  document.querySelectorAll(".diff-btn").forEach(btn => {
    btn.classList.remove("active");

    if (btn.textContent === level) {
      btn.classList.add("active");
    }
  });
}


  // DO NOT REMOVEEEE >:[ (Render the cards when the page loads)
  renderDeckOptions();
  updateCounter();
</script>
    
  </body>
</html>
