<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" href="icon.png">

  <link rel="stylesheet" href="main.css">
  <link rel="stylesheet" href="extra-designs.css">
  <link rel="stylesheet" href="reviews.css">
  <link rel="stylesheet" href="review-finished.css">

  <title>StudyBuddy - Quiz Results</title>
</head>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<body>

<nav class="headtitle">
  <div class="titlecontainer">
    <img src="icon.png" style="width: 40px;">
    <a href="index.html" id="title">StudyBuddy</a>
  </div>

  <a id="cardscounter">No. of Decks</a>

  <div class="headerbtns">
    <a href="mydecks.html"><button class="mainbtn">My Decks</button></a>
    <a href="reviews.html"><button class="mainbtn">Review</button></a>
    <a href="quiz.html"><button class="mainbtn">Quiz</button></a>
  </div>
</nav>

<div class="spacer">

  <div class="mdtopcontainer">
    <h1>Quiz Complete!</h1>
  </div>

  <div class="reviewresultscontainer">
    <h1>Nice work!</h1>

    <div class="resultscontainer" id="resultsBox"></div>

    <button onclick="quizAgain()" class="mainbtn"
      style="color:#ecdece; background-color:#664435;">
      Try Again
    </button>
  </div>
</div>

<script>
window.onload = function () {
  confetti({
    particleCount: 180,
    spread: 100,
    origin: { y: 0.6 }
  });
};

const deck = JSON.parse(localStorage.getItem("currentReviewDeck"));
const results = JSON.parse(localStorage.getItem("quizResults"));

const box = document.getElementById("resultsBox");

if (deck && results) {
  box.innerHTML = `
    <div>
      <h1>${deck.name}</h1>
      <p>Deck</p>
    </div>

    <div>
      <h1>${results.total}</h1>
      <p>Total Questions</p>
    </div>

    <div>
      <h1>${results.correct}</h1>
      <p>Correct</p>
    </div>

    <div>
      <h1>${results.wrong}</h1>
      <p>Wrong</p>
    </div>
  `;
}

function quizAgain() {
  window.location.href = "quiz-session.html";
}
</script>

</body>
</html>
