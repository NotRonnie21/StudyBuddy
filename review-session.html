  <body>

  </body>
    <nav class="headtitle">

      <div class="titlecontainer">
        <img src="icon.png" style="width: 40px; height: auto;">
        <a href="index.html" id="title">StudyBuddy</a>
      </div>

      <div class="headerbtns">
        <a href="mydecks.html"><button class="mainbtn">My Decks</button></a>
        <a href="reviews.html"><button class="mainbtn">Review</button></a>
        <a href="quiz.html"><button class="mainbtn">Quiz</button></a>

    <div class="spacer">

      <div class="mdtopcontainer">
        <h1>Review Mode</h1>
      </div>
      
      <a class="subtitle">Flip through your cards one at a time</a>

      <div class="reviewsessioncontainer">
        <h1 id="deckName"></h1>
        <h1>Cards: <span id="cardsCounter"></span></h1>
        <div id="reviewcardContainer">
          
        </div>
        <div class="reviewsessionbtns">
            <button class="smallbtn" onclick="prevCard()" id="prevBtn">Previous</button>
            <button class="smallbtn" onclick="nextCard()" id="nextBtn" style="color: #ecdece; background-color: #664435;">Next</button>
        </div>
        
      </div>
    </div>

    <script>
        const deck = JSON.parse(localStorage.getItem("currentReviewDeck"));

        if (!deck) {
            alert("No deck found!");
        } else {
            console.log(deck); // contains all cards
        }

        // Show the deck name
        if (deck) {
            document.getElementById("deckName").innerText = deck.name;
        } else {
            document.getElementById("deckName").innerText = "Deck not found";
        }

        function updateCounter() {
    document.getElementById("cardsCounter").innerText =
        (currentIndex + 1) + " / " + deck.cards.length;
}

        let currentIndex = 0;
let showQuestion = true;

const container = document.getElementById("reviewcardContainer");

function renderCard() {
    if (!deck || !deck.cards || deck.cards.length === 0) {
    console.log("Deck data:", deck);
    container.innerHTML = "<p>No cards available</p>";
    return;
}

    const card = deck.cards[currentIndex];

    updateCounter();

    updateButtons();

    container.innerHTML = `
        <div class="flip-card">
        <div class="flip-inner" id="flipInner">

            <div class="flip-front">
                
                <p>${card.question}</p>
                <p>Question</p>
                <button class="flipbtn" onclick="flipCard()">Flip</button>
            </div>

            <div class="flip-back">
                
                <p>${card.answer}</p>
                <p>Answer</p>
                <button class="flipbtn" onclick="flipCard()">Flip</button>
            </div>

        </div>
    </div>

    

    `;
}

function flipCard() {
    document.getElementById("flipInner").classList.toggle("flipped");
}

function nextCard() {
    if (currentIndex < deck.cards.length - 1) {
        currentIndex++;
        renderCard();
    } else {
        renderCard(); // show finish state
    }
}

function prevCard() {
    if (currentIndex > 0) {
        currentIndex--;
        renderCard();
    }
}

function updateButtons() {
    const nextBtn = document.getElementById("nextBtn");

    if (currentIndex < deck.cards.length - 1) {
        nextBtn.innerText = "Next";
        nextBtn.onclick = nextCard;
    } else {
        nextBtn.innerText = "Finish";
        nextBtn.onclick = finishReview;
    }
}

let prevButton = "";

if (currentIndex > 0) {
    prevButton = `<button onclick="prevCard()">Previous</button>`;
} 

let nextButton = "";

if (currentIndex < deck.cards.length - 1) {
    nextButton = `<button onclick="nextCard()">Next</button>`;
} else {
    nextButton = `<button onclick="finishReview()">Finish</button>`;
}

function finishReview() {
    window.location.href = "review-finished.html";
}



// initial render
renderCard();
    </script>
